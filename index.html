<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>My Website!</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <script src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-3.4.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.bundle.min.js"
        integrity="sha384-xrRywqdh3PHs8keKZN+8zzc5TX0GRTLCcmivcbNJWm2rs5C8PRhcEn3czEjhAO9o"
        crossorigin="anonymous"></script>

</head>

<body>
    <div id="carousel" class="carousel slide text-center" data-ride="carousel">
        <div class="carousel-inner">
            
            <div class="carousel-item active bg-info" data-interval="10000">
                <div class="col-xs-12" style="height:150px;"></div>
                <img src="./assets/aboutme.png" alt="aboutme picture" style="height: 120px">
                <div class="text-dark">About Me</div>
                <div class="col-xs-12" style="height:150px;"></div>
            </div>
            <div class="carousel-item bg-secondary" data-interval="10000">
                <div class="col-xs-12" style="height:150px;"></div>
                <img src="./assets/career.png" alt="aboutme picture" style="height: 120px">
                <div class="text-dark">Career</div>
                <div class="col-xs-12" style="height:150px;"></div>
            </div>
        </div>
        <a class="carousel-control-prev" href="#carousel" role="button" data-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="sr-only">Previous</span>
        </a>
        <a class="carousel-control-next" href="#carousel" role="button" data-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="sr-only">Next</span>
        </a>
    </div>

</body>

</html>
