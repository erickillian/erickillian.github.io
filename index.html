<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>My Website!</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <script src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-3.4.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.bundle.min.js"
        integrity="sha384-xrRywqdh3PHs8keKZN+8zzc5TX0GRTLCcmivcbNJWm2rs5C8PRhcEn3czEjhAO9o"
        crossorigin="anonymous"></script>

</head>

<body class="jumbotron text-center">


    <picture>
        <img src="./assets/me2.png" alt="profile picture" style="height: 150px;">
    </picture>
    <h1 class="display-4"></h1>
    <p class="lead">This is my Webpage!</p>
    <hr class="my-4">
    <div class="accordion" id="accordian">
        <div class="card">
            <div class="card-header" id="headingAbout">
                <h2 class="mb-0">
                    <button class="btn btn-link text-secondary collapsed" type="button" data-toggle="collapse" data-target="#about"
                        aria-expanded="false" aria-controls="about">
                        About Me
                    </button>
                </h2>
            </div>
            <div id="about" class="collapse" aria-labelledby="headingAbout" data-parent="#accordian">
                <div class="card-body">
                    Hello! My name is Eric Killian and I am a first year Electrical and Computer Engineering Student
                    at The Ohio State University.
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-header" id="headingBackground">
                <h2 class="mb-0">
                    <button class="btn btn-link text-secondary collapsed" type="button" data-toggle="collapse"
                        data-target="#background" aria-expanded="false" aria-controls="background">
                        Background
                    </button>
                </h2>
            </div>
            <div id="background" class="collapse" aria-labelledby="headingBackground" data-parent="#accordian">
                <div class="card-body">
                    Info about my background !!
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-header" id="headingThree">
                <h2 class="mb-0">
                    <button class="btn btn-link text-secondary collapsed" type="button" data-toggle="collapse" data-target="#career"
                        aria-expanded="true" aria-controls="career">
                        Career
                    </button>
                </h2>
            </div>
            <div id="career" class="collapse" aria-labelledby="headingThree" data-parent="#accordian">
                <div class="card-body">
                    Info about my career will go here
                </div>
            </div>
        </div>
    </div>

</body>

</html>
